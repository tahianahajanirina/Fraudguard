name: FraudGuard CI — Tests

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  test-api:
    name: API Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        working-directory: api
        run: uv sync --frozen --no-install-project

      - name: Run API tests
        working-directory: api
        run: |
          PYTHONPATH=. uv run --no-project pytest ../tests/test_api.py -v --tb=short

  test-airflow:
    name: Airflow DAG Tests (Preprocessing + Model + Pipeline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Airflow and dependencies
        run: |
          pip install --quiet \
            apache-airflow==2.8.3 \
            mlflow==2.11.3 \
            scikit-learn \
            lightgbm \
            pandas \
            numpy \
            joblib \
            pyarrow \
            pytest

      - name: Run preprocessing tests
        run: |
          PYTHONPATH=airflow/dags pytest tests/test_preprocessing.py -v --tb=short

      - name: Run model tests
        run: |
          PYTHONPATH=airflow/dags pytest tests/test_model.py -v --tb=short

      - name: Run pipeline tests
        run: |
          PYTHONPATH=airflow/dags pytest tests/test_pipeline.py -v --tb=short

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Lint API
        run: ruff check api/main.py

      - name: Lint DAGs
        run: ruff check airflow/dags/
