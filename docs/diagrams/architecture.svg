<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 800" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="1300" height="800" rx="12" fill="#ffffff"/>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="5" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#1e1e1e"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="5" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#017CEE"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="5" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#009688"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="5" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#E6522C"/>
    </marker>
    <marker id="arr-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="5" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#F46800"/>
    </marker>
    <marker id="arr-mlops" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="5" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#0194E2"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="650" y="30" text-anchor="middle" font-size="22" font-weight="700" fill="#1e1e1e">FraudGuard — MLOps Architecture (13 Docker Services)</text>

  <!-- ===== EXTERNAL LAYER ===== -->
  <rect x="30" y="52" width="580" height="65" rx="10" fill="#f0f0f0" fill-opacity="0.5" stroke="#999" stroke-width="1"/>
  <text x="42" y="68" font-size="11" fill="#555" font-weight="700" letter-spacing="1">EXTERNAL</text>
  <rect x="55" y="78" width="140" height="30" rx="5" fill="#e0e0e0" stroke="#999" stroke-width="1.5"/>
  <text x="125" y="98" text-anchor="middle" font-size="12" font-weight="600" fill="#1e1e1e">User / Client</text>
  <rect x="250" y="78" width="190" height="30" rx="5" fill="#fff3bf" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="345" y="98" text-anchor="middle" font-size="12" font-weight="600" fill="#1e1e1e">Kaggle creditcard.csv</text>

  <!-- ===== SERVING LAYER ===== -->
