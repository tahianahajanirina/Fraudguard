  <rect x="660" y="85" width="250" height="40" rx="6" fill="#ffccbc" stroke="#E6522C" stroke-width="1.5"/>
  <text x="785" y="110" text-anchor="middle" font-size="14" font-weight="600" fill="#1e1e1e">Prometheus :9090</text>

  <rect x="660" y="150" width="250" height="40" rx="6" fill="#ffe0b2" stroke="#F46800" stroke-width="1.5"/>
  <text x="785" y="175" text-anchor="middle" font-size="14" font-weight="600" fill="#1e1e1e">Grafana :3000</text>

  <rect x="660" y="220" width="250" height="34" rx="5" fill="#fff3e0" stroke="#F46800" stroke-width="1"/>
  <text x="785" y="242" text-anchor="middle" font-size="12" fill="#1e1e1e">StatsD Exporter :9102</text>

  <rect x="660" y="275" width="250" height="34" rx="5" fill="#fff3e0" stroke="#E6522C" stroke-width="1"/>
  <text x="785" y="297" text-anchor="middle" font-size="12" fill="#1e1e1e">Node Exporter :9100</text>

  <rect x="660" y="330" width="250" height="34" rx="5" fill="#fff3e0" stroke="#E6522C" stroke-width="1"/>
  <text x="785" y="352" text-anchor="middle" font-size="12" fill="#1e1e1e">cAdvisor :8081</text>

  <!-- Monitoring internal arrows — staggered X to avoid crossing -->
  <!-- StatsD → Prometheus (center line) -->
  <path d="M785 220 L785 125" fill="none" stroke="#E6522C" stroke-width="1.5" marker-end="url(#arr-red)"/>

