apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraudguard-api
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: fraudguard-api
          imagePullPolicy: Always
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
              ephemeral-storage: 128Mi
            limits:
              cpu: 1
              memory: 1Gi
              ephemeral-storage: 512Mi
