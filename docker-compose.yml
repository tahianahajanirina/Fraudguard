services:
  postgres:
    image: postgres:14-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} && psql -U ${POSTGRES_USER} -d ${POSTGRES_DB} -c 'SELECT 1' && psql -U mlflow -d mlflow_db -c 'SELECT 1'"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  mlflow:
    build:
      context: ./mlflow
    ports:
      - "5000:5000"
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    environment:
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy

  airflow:
    build:
      context: ./airflow
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
      AIRFLOW_UID: ${AIRFLOW_UID}
    volumes:
      - ../creditcard.csv:/opt/airflow/data:ro
      - ./airflow/dags:/opt/airflow/dags
      - ./artifacts:/opt/airflow/artifacts
    ports:
      - "8080:8080"
    command:
      - bash
      - -c
      - |
        airflow db migrate &&
        (airflow users create \
          --username admin --password admin \
          --firstname Admin --lastname User \
          --role Admin --email admin@fraudguard.ai \
          2>/dev/null || true) &&
        { airflow webserver & } &&
        airflow scheduler
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_healthy

  api:
    build:
      context: ./api
    environment:
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
    volumes:
      - ./artifacts:/artifacts
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    depends_on:
      mlflow:
        condition: service_healthy

  webapp:
    build:
      context: ./webapp
    environment:
      API_URL: http://api:8000
    volumes:
      - ./webapp/assets:/app/assets:ro
    ports:
      - "8501:8501"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  mlflow_artifacts:
