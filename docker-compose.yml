services:
  postgres:
    image: postgres:14-alpine
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} && psql -U ${POSTGRES_USER} -d ${POSTGRES_DB} -c 'SELECT 1' && psql -U mlflow -d mlflow_db -c 'SELECT 1'"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  mlflow:
    build:
      context: ./mlflow
      network: host
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
    ports:
      - "${MLFLOW_PORT}:${MLFLOW_PORT}"
    environment:
      MLFLOW_PORT: ${MLFLOW_PORT}
      MLFLOW_BACKEND_STORE_URI: ${MLFLOW_BACKEND_STORE_URI}
      MLFLOW_ARTIFACTS_DESTINATION: ${MLFLOW_ARTIFACTS_DESTINATION}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
      MLFLOW_S3_ENDPOINT_URL: ${MLFLOW_S3_ENDPOINT_URL}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
      AWS_S3_FORCE_PATH_STYLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      localstack-init:
        condition: service_completed_successfully

  airflow:
    build:
      context: ./airflow
      network: host
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
      MLFLOW_S3_ENDPOINT_URL: ${MLFLOW_S3_ENDPOINT_URL}
      MLFLOW_S3_BUCKET: ${MLFLOW_S3_BUCKET}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
      S3_EXPECTED_BUCKET_OWNER: ${S3_EXPECTED_BUCKET_OWNER:-000000000000}
      AIRFLOW_UID: ${AIRFLOW_UID}
      AIRFLOW__METRICS__STATSD_ON: "True"
      AIRFLOW__METRICS__STATSD_HOST: statsd-exporter
      AIRFLOW__METRICS__STATSD_PORT: 9125
      AIRFLOW__METRICS__STATSD_PREFIX: airflow
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
    volumes:
      - ../creditcard.csv:/opt/airflow/data:ro
      - ./airflow/dags:/opt/airflow/dags
      - ./artifacts:/opt/airflow/artifacts
      - ./tests:/opt/airflow/tests:ro
    ports:
      - "${AIRFLOW_PORT}:8080"
    command:
      - bash
      - -c
      - |
        set -e
        echo "[airflow] Initializing metadata DB (first run) ..."
        for i in $$(seq 1 $${AIRFLOW_DB_INIT_MAX_RETRIES}); do
          airflow db init && break
          echo "[airflow] db init failed, retrying in $${AIRFLOW_DB_INIT_RETRY_DELAY}s ($$i/$${AIRFLOW_DB_INIT_MAX_RETRIES})"
          sleep $${AIRFLOW_DB_INIT_RETRY_DELAY}
        done

        echo "[airflow] Ensuring admin user exists ..."
        airflow users create \
          --username $${AIRFLOW_ADMIN_USERNAME} --password $${AIRFLOW_ADMIN_PASSWORD} \
          --firstname $${AIRFLOW_ADMIN_FIRSTNAME} --lastname $${AIRFLOW_ADMIN_LASTNAME} \
          --role $${AIRFLOW_ADMIN_ROLE} --email $${AIRFLOW_ADMIN_EMAIL} \
          2>/dev/null || true

        echo "[airflow] Starting scheduler + webserver ..."
        airflow scheduler &
        exec airflow webserver
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_healthy
      statsd-exporter:
        condition: service_started

  api:
    build:
      context: ./api
      network: host
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
    environment:
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
      MLFLOW_S3_ENDPOINT_URL: ${MLFLOW_S3_ENDPOINT_URL}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
      AWS_S3_FORCE_PATH_STYLE: "true"
    volumes:
      - ./artifacts:/artifacts
      - ./tests:/app/tests:ro
    ports:
      - "${API_PORT}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    depends_on:
      mlflow:
        condition: service_healthy

  webapp:
    build:
      context: ./webapp
      network: host
    restart: unless-stopped
    environment:
      API_URL: http://api:8000
    volumes:
      - ./webapp/assets:/app/assets:ro
    ports:
      - "${WEBAPP_PORT:-8501}:8501"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      api:
        condition: service_healthy

  pgadmin:
    image: dpage/pgadmin4:8
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "False"
    ports:
      - "${PGADMIN_PORT}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

  localstack:
    image: localstack/localstack:3
    restart: unless-stopped
    environment:
      SERVICES: s3
      DEBUG: 0
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
    ports:
      - "${LOCALSTACK_PORT}:4566"
    volumes:
      - localstack_data:/var/lib/localstack

  localstack-init:
    image: amazon/aws-cli:latest
    restart: "no"
    depends_on:
      localstack:
        condition: service_started
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
    entrypoint: /bin/sh
    command:
      - -c
      - |
        until aws --endpoint-url=http://localstack:4566 s3 ls >/dev/null 2>&1; do
          echo "waiting for localstack..."
          sleep 2
        done
        aws --endpoint-url=http://localstack:4566 s3 mb s3://${MLFLOW_S3_BUCKET} || true
        aws --endpoint-url=http://localstack:4566 s3 mb s3://data || true
        echo "localstack buckets ready: ${MLFLOW_S3_BUCKET}, data"

  prometheus:
    build:
      context: ./prometheus
      network: host
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT}:9090"
    volumes:
      - prometheus_data:/prometheus
    depends_on:
      api:
        condition: service_healthy
      airflow:
        condition: service_healthy
      statsd-exporter:
        condition: service_started
      node-exporter:
        condition: service_started
      cadvisor:
        condition: service_started

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      prometheus:
        condition: service_started

  statsd-exporter:
    image: prom/statsd-exporter:latest
    restart: unless-stopped
    ports:
      - "${STATSD_EXPORTER_PORT}:9102"
      - "${STATSD_EXPORTER_UDP_PORT}:9125/udp"

  node-exporter:
    image: prom/node-exporter:latest
    restart: unless-stopped
    ports:
      - "${NODE_EXPORTER_PORT}:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    restart: unless-stopped
    ports:
      - "${CADVISOR_PORT}:8080"
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro

  locust:
    image: locustio/locust:latest
    restart: unless-stopped
    ports:
      - "8089:8089"
    volumes:
      - ./load_tests:/mnt/locust
    command: -f /mnt/locust/locustfile.py --host=http://api:8000
    depends_on:
      api:
        condition: service_healthy
volumes:
  postgres_data:
  pgadmin_data:
  localstack_data:
  prometheus_data:
  grafana_data:
