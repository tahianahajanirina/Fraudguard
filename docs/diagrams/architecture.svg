  <text x="305" y="303" text-anchor="middle" font-size="15" font-weight="600" fill="#1e1e1e">Apache Airflow :8080</text>
  <rect x="130" y="324" width="160" height="24" rx="4" fill="#e3f2fd" stroke="#017CEE" stroke-width="1"/>
  <text x="210" y="340" text-anchor="middle" font-size="10" fill="#017CEE">fraud_detection_pipeline</text>
  <rect x="310" y="324" width="160" height="24" rx="4" fill="#e3f2fd" stroke="#017CEE" stroke-width="1"/>
  <text x="390" y="340" text-anchor="middle" font-size="10" fill="#017CEE">fraud_retraining_ct</text>

