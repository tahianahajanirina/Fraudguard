  <path d="M740 275 L740 125" fill="none" stroke="#E6522C" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arr-red)"/>

  <!-- cAdvisor → Prometheus (further left offset) -->
  <path d="M700 330 L700 125" fill="none" stroke="#E6522C" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arr-red)"/>

  <!-- Prometheus → Grafana -->
  <path d="M830 125 L830 150" fill="none" stroke="#F46800" stroke-width="1.5" marker-end="url(#arr-orange)"/>

