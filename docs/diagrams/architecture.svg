  <rect x="30" y="494" width="580" height="85" rx="10" fill="#e8eaf6" fill-opacity="0.4" stroke="#336791" stroke-width="1"/>
  <text x="42" y="510" font-size="11" fill="#336791" font-weight="700" letter-spacing="1">DATA LAYER</text>
  <rect x="60" y="520" width="240" height="40" rx="6" fill="#bbcfe8" stroke="#336791" stroke-width="1.5"/>
  <text x="180" y="545" text-anchor="middle" font-size="15" font-weight="600" fill="#1e1e1e">PostgreSQL :5432</text>
  <rect x="340" y="520" width="250" height="40" rx="6" fill="#ffe0b2" stroke="#FF9900" stroke-width="1.5"/>
  <text x="465" y="545" text-anchor="middle" font-size="15" font-weight="600" fill="#1e1e1e">LocalStack S3 :4566</text>

