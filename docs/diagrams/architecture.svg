  <rect x="960" y="52" width="300" height="200" rx="10" fill="#f5f5f5" fill-opacity="0.5" stroke="#999" stroke-width="1"/>
  <text x="972" y="68" font-size="11" fill="#555" font-weight="700" letter-spacing="1">ADMIN &amp; TESTING</text>

  <rect x="985" y="88" width="250" height="40" rx="6" fill="#e0e0e0" stroke="#999" stroke-width="1.5"/>
  <text x="1110" y="113" text-anchor="middle" font-size="14" font-weight="600" fill="#1e1e1e">pgAdmin :5051</text>

  <rect x="985" y="148" width="250" height="40" rx="6" fill="#e0e0e0" stroke="#999" stroke-width="1.5"/>
  <text x="1110" y="173" text-anchor="middle" font-size="14" font-weight="600" fill="#1e1e1e">Locust :8089</text>

  <!-- ===== CONNECTION ARROWS (elbow style) ===== -->

  <!-- User → FastAPI (straight down, elbow right) -->
  <path d="M100 108 L100 130 Q100 140 110 140 L140 140 Q150 140 150 150 L150 170" fill="none" stroke="#1e1e1e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- User → Streamlit (elbow right then down) -->
  <path d="M160 108 L160 130 Q160 140 170 140 L440 140 Q450 140 450 150 L450 170" fill="none" stroke="#1e1e1e" stroke-width="1.5" marker-end="url(#arr)"/>


  <!-- User → Airflow (far left elbow down) -->
  <path d="M55 108 L55 130 Q55 140 55 150 L55 243 Q55 253 65 253 L120 253 Q130 253 130 263 L130 278" fill="none" stroke="#1e1e1e" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arr)"/>

  <!-- Kaggle CSV → Airflow (straight down with elbow) -->
  <path d="M345 108 L345 235 Q345 245 335 245 L315 245 Q305 245 305 255 L305 278" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arr)"/>

  <!-- Streamlit → FastAPI (horizontal arrow) -->
  <path d="M340 190 L295 190" fill="none" stroke="#FF4B4B" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- FastAPI → MLflow (load model — elbow left, down along outer edge, into MLOps) -->
  <path d="M55 210 L55 230 Q55 240 45 240 L42 240 Q38 240 38 250 L38 405 Q38 415 48 415 L165 430" fill="none" stroke="#009688" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- FastAPI → LocalStack S3 (load scaler — elbow right side down) -->
  <path d="M260 210 L260 230 Q260 240 270 240 L600 240 Q610 240 610 250 L610 508 Q610 518 600 518 L590 540" fill="none" stroke="#009688" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arr-green)"/>

  <!-- Airflow → MLflow (log experiments — straight down) -->
  <path d="M305 348 L305 375 Q305 385 305 395 L305 413" fill="none" stroke="#017CEE" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Airflow → PostgreSQL (metadata — elbow down-left) -->
  <path d="M200 348 L200 375 Q200 385 190 385 L180 385 Q170 385 170 395 L170 480 Q170 490 170 500 L170 520" fill="none" stroke="#017CEE" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arr-blue)"/>

  <!-- Airflow → LocalStack S3 (artifacts — elbow down-right) -->
  <path d="M420 348 L420 375 Q420 385 430 385 L450 385 Q460 385 460 395 L460 480 Q460 490 460 500 L460 520" fill="none" stroke="#017CEE" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- MLflow → PostgreSQL (dashed) -->
  <path d="M240 453 L240 480 Q240 490 230 490 L210 490 Q200 490 200 500 L200 520" fill="none" stroke="#0194E2" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- MLflow → S3 (dashed) -->
  <path d="M370 453 L370 480 Q370 490 380 490 L400 490 Q410 490 410 500 L410 520" fill="none" stroke="#0194E2" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- FastAPI → StatsD (metrics — horizontal right into monitoring) -->
  <path d="M295 185 L610 185 Q620 185 620 195 L620 230 Q620 237 630 237 L660 237" fill="none" stroke="#E6522C" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arr-red)"/>

  <!-- Airflow → StatsD (metrics — horizontal right into monitoring) -->
  <path d="M480 298 L610 298 Q620 298 620 308 L620 350 Q620 357 630 357 L660 347" fill="none" stroke="#E6522C" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arr-red)"/>

  <!-- pgAdmin → PostgreSQL (elbow: left, down, across bottom, up) -->
  <path d="M985 108 L960 108 Q950 108 950 118 L950 690 Q950 700 940 700 L180 700 Q170 700 170 690 L170 560" fill="none" stroke="#999" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr)"/>

  <!-- Locust → FastAPI (elbow: left, up, across top, down) -->
  <path d="M985 168 L960 168 Q950 168 950 158 L950 45 Q950 38 940 38 L175 38 Q165 38 165 48 L165 170" fill="none" stroke="#999" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr)"/>

  <!-- ===== LEGEND ===== -->
  <rect x="30" y="610" width="880" height="70" rx="8" fill="#fafafa" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="630" font-size="11" font-weight="700" fill="#1e1e1e">LEGEND</text>

  <!-- Solid line -->
  <line x1="50" y1="652" x2="90" y2="652" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arr)"/>
  <text x="98" y="656" font-size="10" fill="#555">Data flow</text>

  <!-- Dashed line -->
  <line x1="200" y1="652" x2="240" y2="652" stroke="#1e1e1e" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arr)"/>
  <text x="248" y="656" font-size="10" fill="#555">Config / metadata</text>

  <!-- Color swatches -->
  <rect x="400" y="644" width="14" height="14" rx="3" fill="#b2dfdb" stroke="#009688" stroke-width="1"/>
  <text x="420" y="656" font-size="10" fill="#555">Serving</text>

  <rect x="490" y="644" width="14" height="14" rx="3" fill="#bbdefb" stroke="#017CEE" stroke-width="1"/>
  <text x="510" y="656" font-size="10" fill="#555">Orchestration</text>

  <rect x="610" y="644" width="14" height="14" rx="3" fill="#b3e5fc" stroke="#0194E2" stroke-width="1"/>
  <text x="630" y="656" font-size="10" fill="#555">MLOps</text>

  <rect x="700" y="644" width="14" height="14" rx="3" fill="#bbcfe8" stroke="#336791" stroke-width="1"/>
  <text x="720" y="656" font-size="10" fill="#555">Data</text>

  <rect x="770" y="644" width="14" height="14" rx="3" fill="#ffccbc" stroke="#E6522C" stroke-width="1"/>
  <text x="790" y="656" font-size="10" fill="#555">Monitoring</text>

  <rect x="880" y="644" width="14" height="14" rx="3" fill="#e0e0e0" stroke="#999" stroke-width="1"/>
  <text x="900" y="656" font-size="10" fill="#555">Admin / Testing</text>

  <!-- Footer -->
  <text x="650" y="760" text-anchor="middle" font-size="11" fill="#999">FraudGuard — MLOps Credit Card Fraud Detection Pipeline — 13 Docker Services</text>
</svg>