  <text x="42" y="161" font-size="11" fill="#00695c" font-weight="700" letter-spacing="1">SERVING</text>
  <rect x="55" y="170" width="240" height="40" rx="6" fill="#b2dfdb" stroke="#009688" stroke-width="1.5"/>
  <text x="175" y="195" text-anchor="middle" font-size="15" font-weight="600" fill="#1e1e1e">FastAPI :8000</text>
