  <rect x="30" y="391" width="580" height="75" rx="10" fill="#e1f5fe" fill-opacity="0.4" stroke="#0194E2" stroke-width="1"/>
  <text x="42" y="407" font-size="11" fill="#0194E2" font-weight="700" letter-spacing="1">MLOPS</text>
  <rect x="165" y="413" width="280" height="40" rx="6" fill="#b3e5fc" stroke="#0194E2" stroke-width="1.5"/>
  <text x="305" y="437" text-anchor="middle" font-size="15" font-weight="600" fill="#1e1e1e">MLflow :5000</text>
  <text x="305" y="451" text-anchor="middle" font-size="10" fill="#0194E2">Tracking + Model Registry</text>

