apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-web
  template:
    metadata:
      labels:
        app: airflow-web
    spec:
      automountServiceAccountToken: false
      initContainers:
        - name: wait-postgres
          image: postgres:14-alpine
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: fraudguard-platform-secrets
                  key: POSTGRES_USER
          command: ["sh", "-c", "until pg_isready -h postgres -U ${POSTGRES_USER}; do sleep 2; done"]
        - name: wait-mlflow
          image: curlimages/curl:8.11.1
          command: ["sh", "-c", "until curl -sf http://mlflow:5000/health >/dev/null; do sleep 2; done"]
        - name: copy-dags
          image: busybox:1.36
          command: ["sh", "-c", "cp /dags-cm/*.py /opt/airflow/dags/"]
          volumeMounts:
            - name: dags-cm
              mountPath: /dags-cm
            - name: dags
              mountPath: /opt/airflow/dags
      containers:
        - name: airflow-web
          image: ghcr.io/REPLACE_ME/fraudguard-airflow:sha-0000000
          imagePullPolicy: IfNotPresent
          command:
            - bash
            - -c
            - |
              set -e
              airflow db init
              airflow users create \
                --username ${AIRFLOW_ADMIN_USERNAME} \
                --password ${AIRFLOW_ADMIN_PASSWORD} \
                --firstname ${AIRFLOW_ADMIN_FIRSTNAME} \
                --lastname ${AIRFLOW_ADMIN_LASTNAME} \
                --role ${AIRFLOW_ADMIN_ROLE} \
                --email ${AIRFLOW_ADMIN_EMAIL} \
                2>/dev/null || true
              exec airflow webserver
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: AIRFLOW__CORE__EXECUTOR
              value: LocalExecutor
            - name: AIRFLOW__CORE__HOSTNAME_CALLABLE
              value: airflow.utils.net.get_host_ip_address
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              valueFrom:
                secretKeyRef:
                  name: fraudguard-platform-secrets
                  key: AIRFLOW_SQL_ALCHEMY_CONN
            - name: AIRFLOW__WEBSERVER__SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: fraudguard-platform-secrets
                  key: AIRFLOW__WEBSERVER__SECRET_KEY
            - name: AIRFLOW_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: fraudguard-platform-secrets
                  key: AIRFLOW_ADMIN_USERNAME
            - name: AIRFLOW_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fraudguard-platform-secrets
                  key: AIRFLOW_ADMIN_PASSWORD
            - name: AIRFLOW_ADMIN_FIRSTNAME
              valueFrom:
                secretKeyRef:
                  name: fraudguard-platform-secrets
                  key: AIRFLOW_ADMIN_FIRSTNAME
            - name: AIRFLOW_ADMIN_LASTNAME
              valueFrom:
                secretKeyRef:
                  name: fraudguard-platform-secrets
                  key: AIRFLOW_ADMIN_LASTNAME
            - name: AIRFLOW_ADMIN_ROLE
              valueFrom:
                secretKeyRef:
                  name: fraudguard-platform-secrets
                  key: AIRFLOW_ADMIN_ROLE
            - name: AIRFLOW_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: fraudguard-platform-secrets
                  key: AIRFLOW_ADMIN_EMAIL
            - name: MLFLOW_TRACKING_URI
              value: http://mlflow:5000
            - name: MLFLOW_S3_ENDPOINT_URL
              value: http://localstack:4566
            - name: MLFLOW_S3_BUCKET
              value: mlflow
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: fraudguard-platform-secrets
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: fraudguard-platform-secrets
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_DEFAULT_REGION
              value: us-east-1
            - name: S3_EXPECTED_BUCKET_OWNER
              value: "000000000000"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
              ephemeral-storage: 128Mi
            limits:
              cpu: 1500m
              memory: 2Gi
              ephemeral-storage: 1Gi
          volumeMounts:
            - name: dags
              mountPath: /opt/airflow/dags
            - name: shared-artifacts
              mountPath: /opt/airflow/artifacts
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
      volumes:
        - name: dags-cm
          configMap:
            name: airflow-dags
        - name: dags
          emptyDir: {}
        - name: shared-artifacts
          persistentVolumeClaim:
            claimName: shared-artifacts
